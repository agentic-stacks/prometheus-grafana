name: prometheus-grafana
owner: agentic-stacks
version: 0.1.0
description: >
  Monitoring stack — teaches AI agents to deploy, configure, operate, and
  troubleshoot Prometheus metrics collection, Grafana dashboards, Alertmanager
  notifications, and the exporter ecosystem.

target:
  software: prometheus-grafana
  versions:
    - "prometheus-3.x"
    - "prometheus-2.x"
    - "grafana-12.x"
    - "grafana-11.x"

skills:
  - name: concepts
    entry: skills/foundation/concepts
    description: Metrics model, time series, labels, metric types, PromQL preview
  - name: architecture
    entry: skills/foundation/architecture
    description: Component overview, data flow, network requirements, deployment patterns
  - name: prometheus
    entry: skills/deploy/prometheus
    description: Install and configure Prometheus server (binary, Docker, Helm)
  - name: grafana
    entry: skills/deploy/grafana
    description: Install and configure Grafana (package, Docker, Helm)
  - name: alertmanager
    entry: skills/deploy/alertmanager
    description: Install and configure Alertmanager, routing, receivers
  - name: exporters
    entry: skills/deploy/exporters
    description: node_exporter setup, common exporters reference, Pushgateway
  - name: promql
    entry: skills/operations/promql
    description: PromQL query language — selectors, operators, functions, examples
  - name: dashboards
    entry: skills/operations/dashboards
    description: Grafana dashboards — panels, variables, provisioning, as code
  - name: alerting
    entry: skills/operations/alerting
    description: Alert rules (Prometheus and Grafana), notification channels
  - name: recording-rules
    entry: skills/operations/recording-rules
    description: Recording rules for performance and aggregation
  - name: storage
    entry: skills/operations/storage
    description: TSDB, retention, remote write/read, federation
  - name: upgrades
    entry: skills/operations/upgrades
    description: Upgrade procedures for Prometheus, Grafana, Alertmanager
  - name: prometheus-diagnose
    entry: skills/diagnose/prometheus
    description: Troubleshoot targets, cardinality, OOM, WAL, config errors
  - name: grafana-diagnose
    entry: skills/diagnose/grafana
    description: Troubleshoot datasource, auth, performance, plugin issues
  - name: alertmanager-diagnose
    entry: skills/diagnose/alertmanager
    description: Troubleshoot routing, notifications, silences, clustering
  - name: known-issues
    entry: skills/reference/known-issues
    description: Version-specific issues and breaking changes
  - name: compatibility
    entry: skills/reference/compatibility
    description: Version compatibility matrix for all components
  - name: best-practices
    entry: skills/reference/best-practices
    description: Naming, instrumentation, histogram, alerting, dashboard best practices

requires:
  tools:
    - name: promtool
      description: Prometheus config and rule validation
    - name: amtool
      description: Alertmanager config validation and alert management
    - name: docker
      description: Container deployment (optional)
    - name: helm
      description: Kubernetes deployment (optional)
    - name: kubectl
      description: Kubernetes management (optional)
depends_on: []
